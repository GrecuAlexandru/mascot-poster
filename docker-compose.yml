services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./assets:/app/assets
      - ./templates:/app/templates
      - ./output:/app/output
      - ./tests/fixtures:/app/tests/fixtures
    env_file: .env

  worker:
    build: .
    command: python -c "import time; time.sleep(999999)"
    restart: unless-stopped
    volumes:
      - ./assets:/app/assets
      - ./templates:/app/templates
      - ./output:/app/output
    env_file: .env

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
      GENERIC_TIMEZONE: Europe/Bucharest
    volumes:
      - ./n8n:/home/node/.n8n

volumes:
  pgdata:
