services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./assets:/app/assets
      - ./templates:/app/templates
      - ./output:/app/output
      - ./tests/fixtures:/app/tests/fixtures
    env_file: .env
    environment:
      SEARXNG_BASE_URL: http://searxng:8080

  worker:
    build: .
    command: python -c "import time; time.sleep(999999)"
    restart: unless-stopped
    volumes:
      - ./assets:/app/assets
      - ./templates:/app/templates
      - ./output:/app/output
    env_file: .env
    environment:
      SEARXNG_BASE_URL: http://searxng:8080

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_cache:/var/cache/searxng
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_PUBLIC_BASE_URL:-http://localhost:8080/}
      SEARXNG_SECRET: ${SEARXNG_SECRET:-local-development-only-change-before-public-use}
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/search?q=health&format=json&categories=general', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
      GENERIC_TIMEZONE: Europe/Bucharest
    volumes:
      - ./n8n:/home/node/.n8n

volumes:
  pgdata:
  searxng_cache:
